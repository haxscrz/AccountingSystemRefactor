name: Build and deploy frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - 'web-system/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: web-system
        run: npm ci
      
      - name: Build
        working-directory: web-system
        run: npm run build
      
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: web-system/dist
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    name: Deploy Job
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ${{ github.workspace }}/dist
      
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN_ACCTNG_FRONTEND }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'dist'
          skip_app_build: true
          config_file_location: 'web-system'
